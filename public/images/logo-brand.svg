<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1f8f"/>
      <stop offset="100%" stop-color="#140e6a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c478"/>
      <stop offset="100%" stop-color="#c9a24a"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#e0c478" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a24a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="archClip">
      <path d="M30 220 L30 100 A70 70 0 0 1 170 100 L170 220 Z"/>
    </clipPath>
  </defs>
  <!-- Left half of arch (navy) -->
  <path d="M30 220 L30 100 A70 70 0 0 1 100 30 L100 220 Z" fill="url(#navyGrad)"/>
  <!-- Right half of arch (cream) -->
  <path d="M100 220 L100 30 A70 70 0 0 1 170 100 L170 220 Z" fill="#f3e9d2"/>
  <!-- Arch outline -->
  <path d="M30 220 L30 100 A70 70 0 0 1 170 100 L170 220" stroke="#0a0840" stroke-width="2" fill="none"/>
  <!-- Center divider -->
  <line x1="100" y1="30" x2="100" y2="220" stroke="#0a0840" stroke-width="1.5" opacity="0.3"/>
  <!-- Star glow -->
  <circle cx="100" cy="95" r="42" fill="url(#starGlow)"/>
  <!-- Star (8-point) -->
  <g transform="translate(100,95)">
    <path d="M0 -28 L7 -7 L28 0 L7 7 L0 28 L-7 7 L-28 0 L-7 -7 Z" fill="url(#goldGrad)"/>
    <path d="M0 -18 L4 -4 L18 0 L4 4 L0 18 L-4 4 L-18 0 L-4 -4 Z" fill="#fff8e0" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#fff"/>
  </g>
  <!-- Light rays -->
  <g opacity="0.5" stroke="#e0c478" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="40" x2="100" y2="25"/>
    <line x1="135" y1="55" x2="145" y2="45"/>
    <line x1="65" y1="55" x2="55" y2="45"/>
    <line x1="150" y1="90" x2="165" y2="88"/>
    <line x1="50" y1="90" x2="35" y2="88"/>
  </g>
  <!-- Base line -->
  <rect x="20" y="218" width="160" height="6" rx="3" fill="#0a0840"/>
</svg>
